name: 5. Terraform Apply (after merge to main)

# Chạy sau khi PR được merge vào main và có thay đổi infra/
# Lúc này code đã qua: validate trên dev + review + approve → an toàn để apply
on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # OIDC auth với AWS

    # Chỉ cho phép 1 apply chạy tại một thời điểm — tránh concurrent state conflict
    concurrency:
      group: terraform-apply
      cancel-in-progress: false   # không cancel apply đang chạy, queue lại

    defaults:
      run:
        working-directory: infra

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      # ── Auth AWS qua OIDC ──────────────────────────────────────────────────
      - name: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Init với remote backend ────────────────────────────────────────────
      - name: terraform_init
        run: terraform init

      # ── Validate lần cuối trước khi apply ─────────────────────────────────
      - name: terraform_validate
        run: terraform validate -no-color

      # ── Plan và lưu vào file — apply sẽ dùng đúng plan này ────────────────
      - name: terraform_plan
        run: |
          terraform plan -no-color -out=tfplan \
            -var="exchange_rate_api_key=${{ secrets.TF_VAR_EXCHANGE_RATE_API_KEY }}" \
            -var="travelpayouts_api_key=${{ secrets.TF_VAR_TRAVELPAYOUTS_API_KEY }}"

      # ── Apply từ plan file — không có surprise ─────────────────────────────
      - name: terraform_apply
        run: terraform apply -auto-approve tfplan

      # ── In outputs để dễ debug ─────────────────────────────────────────────
      - name: terraform_output
        run: terraform output -no-color
        continue-on-error: true
