name: 2. Build, Test and Scan images 

# Chạy trên dev — chỉ build, test, scan Trivy
# KHÔNG push lên ECR — push sẽ xảy ra sau khi merge vào main (workflow 3)
on:
  workflow_run:
    workflows:
      - 1. Scan source code
    types:
      - completed

jobs:
  # ── Job 1: Phát hiện service nào thay đổi ──────────────────────────────────
  detect-changes:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            exchange-rate-producer: 'services/exchange-rate-producer/**'
            streaming-service:      'services/streaming-service/**'
            money-service:          'services/money-service/**'
            forecast-service:       'services/forecast-service/**'
            tour-producer:          'services/tour-producer/**'
            tour-service:           'services/tour-service/**'
            dataset-maker:          'services/dataset-maker/**'
            frontend:               'services/frontend/**'

  # ── Job 2: Build → Test → Trivy scan (không push) ─────────────────────────
  build-test-scan:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    permissions:
      contents: read # Cho phép đọc code để build và test
      security-events: write  # upload kết quả scan bảo mật lên GitHub Security tab để theo dõi

    # Tạo matrix với 1 job cho mỗi service có thay đổi, chạy song song để tiết kiệm thời gian, không fail-fast để đảm bảo tất cả service đều được scan
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Build image locally (không cần ECR login) ──────────────────────────
      - name: build_image
        run: |
          IMAGE_URI="local/${{ matrix.service }}:${{ github.sha }}"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

          docker build \
            --tag "$IMAGE_URI" \
            "services/${{ matrix.service }}"

      # ── Trivy scan — pipeline fail nếu có CRITICAL/HIGH ───────────────────
      - name: trivy_scan
        continue-on-error: true # Đảm bảo job không fail ngay cả khi phát hiện vulnerabilities, để có thể upload kết quả scan lên GitHub Security tab
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

    
      - name: upload_trivy_sarif
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.service)) != '' # Chỉ upload nếu file SARIF tồn tại (tức là Trivy đã chạy và tạo file kết quả)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
