name: 1. Scan source code

on:
  push:
    branches:
      - dev
    paths:
      - 'services/**'
      - 'infra/**'
      - '.github/workflows/**'

jobs:
  scan_source_code:
    runs-on: ubuntu-latest
    steps:
      - name: copy_source_code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube cần full history để phân tích blame và new code

      # Chạy tests Python để lấy coverage report trước khi scan
      - name: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: run_tests_and_coverage
        run: |
          pip install pytest pytest-cov
          # Chạy tests cho tất cả Python services, bỏ qua nếu không có test
          pytest services/ \
            --cov=services \
            --cov-report=xml:coverage.xml \
            --ignore=services/frontend \
            -q || true

      - name: scan_source_code
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.PROJECT_KEY }}
            -Dsonar.python.version=3.10
            -Dsonar.sources=services
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,**/node_modules/**,**/*.md,**/dist/**
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.branch.name=${{ github.ref_name }}
