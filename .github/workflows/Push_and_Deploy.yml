name: 3. Push to ECR and Deploy to ECS (main branch)

# Chạy sau khi PR được merge vào main
# Lúc này code đã qua: SonarQube scan + Trivy scan + review → an toàn để deploy
on:
  push:
    branches:
      - main
    paths:
      - 'services/**'

jobs:
  # ── Job 1: Phát hiện service nào thay đổi ──────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            exchange-rate-producer: 'services/exchange-rate-producer/**'
            streaming-service:      'services/streaming-service/**'
            money-service:          'services/money-service/**'
            forecast-service:       'services/forecast-service/**'
            tour-producer:          'services/tour-producer/**'
            tour-service:           'services/tour-service/**'
            dataset-maker:          'services/dataset-maker/**'
            frontend:               'services/frontend/**'

  # ── Job 2: Build → Push ECR → Deploy ECS ──────────────────────────────────
  push-and-deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write        # OIDC auth với AWS

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # ── Authenticate với AWS qua OIDC ──────────────────────────────────────
      - name: configure_aws_credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: login_to_ecr
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build image với tag commit SHA ─────────────────────────────────────
      - name: build_image
        env:
          ECR_REGISTRY: ${{ steps.ecr_login.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/${{ matrix.service }}:${{ github.sha }}"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_ENV

          docker build \
            --tag "$IMAGE_URI" \
            --tag "$ECR_REGISTRY/${{ matrix.service }}:latest" \
            --cache-from "$ECR_REGISTRY/${{ matrix.service }}:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            "services/${{ matrix.service }}"

      # ── Push lên ECR ───────────────────────────────────────────────────────
      - name: push_to_ecr
        run: |
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/${{ matrix.service }}:latest"
          echo "Pushed: $IMAGE_URI"

      # ── Cập nhật ECS Task Definition và trigger rolling deploy ─────────────
      - name: deploy_to_ecs
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
        run: |
          # Lấy task definition hiện tại
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ matrix.service }}" \
            --query 'taskDefinition' \
            --output json)

          # Cập nhật image URI trong container definition
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE_URI" \
            --arg SVC "${{ matrix.service }}" \
            '.containerDefinitions |= map(
              if .name == $SVC then .image = $IMAGE else . end
            ) |
            del(.taskDefinitionArn, .revision, .status,
                .requiresAttributes, .compatibilities,
                .registeredAt, .registeredBy)')

          # Đăng ký task definition mới
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered new task definition: $NEW_TASK_DEF_ARN"

          # Cập nhật ECS service với task definition mới (rolling deploy)
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "${{ matrix.service }}" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment

          echo "ECS rolling deployment triggered for ${{ matrix.service }}"

      # ── Chờ deployment hoàn thành ──────────────────────────────────────────
      - name: wait_for_deployment
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
        run: |
          echo "Waiting for ECS service ${{ matrix.service }} to stabilize..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "${{ matrix.service }}"
          echo "Deployment stable: ${{ matrix.service }}"
